<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ancient-history-trivia-pwa/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Test your knowledge of ancient civilizations and historical events with our comprehensive trivia app." />
    <meta name="theme-color" content="#1f2937" />
    <link rel="apple-touch-icon" href="/ancient-history-trivia-pwa/apple-touch-icon.png" />
    <link rel="manifest" href="/ancient-history-trivia-pwa/manifest.json" />
    <title>Ancient History Trivia</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. https://www.foo.tld/one/two?a=b&c=d#qwe becomes
      // https://www.foo.tld/?/one/two&a=b~and~c=d#qwe
      // Notice: /one/two becomes /?/one/two
      // Notice: &c=d becomes ~and~c=d
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/ancient-history-trivia-pwa/src/main.tsx"></script>
  </body>
</html>
